<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SenouraChat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="font-[Poppins] bg-[#0b1426] text-white min-h-screen flex flex-col overflow-x-hidden">

    <header class="sticky top-0 z-50 w-full border-b-2 border-orange-500 bg-[#08101ff2] backdrop-blur-sm shadow-lg">

        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-5 px-5 md:px-10 py-5">

            <h1 class="text-2xl md:text-4xl font-bold tracking-wide flex items-center gap-2">
                🥕 SenouraChat
            </h1>

            <nav class="flex flex-wrap items-center gap-3 md:gap-7 text-sm md:text-base">

                <a href="index.html"
                    class="relative text-slate-200 hover:text-orange-500 transition after:absolute after:left-0 after:-bottom-1 after:h-[2px] after:w-0 after:bg-orange-500 after:transition-all hover:after:w-full">
                    Login
                </a>

                <a href="devs.html"
                    class="relative text-slate-200 hover:text-orange-500 transition after:absolute after:left-0 after:-bottom-1 after:h-[2px] after:w-0 after:bg-orange-500 after:transition-all hover:after:w-full">
                    Desenvolvedores
                </a>

                <a href="chat.html"
                    class="bg-gradient-to-br from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 px-4 py-2 rounded-xl font-medium transition hover:scale-105 active:scale-95 shadow-md">
                    Chat
                </a>

            </nav>

        </div>

    </header>

    <main class="flex-1 flex flex-col lg:flex-row">

        <section class="w-full lg:w-[45%] bg-[#08101f] flex items-center justify-center px-6 md:px-14 py-16">

            <div class="w-full max-w-xl">

                <h2 class="text-4xl md:text-5xl font-bold text-orange-500 mb-8">
                    Entrar
                </h2>

                <form id="loginForm" class="flex flex-col gap-5">

                    <input type="text"
                        id="usuario"
                        placeholder="Usuário"
                        required
                        class="bg-slate-800 border-2 border-slate-700 focus:border-orange-500 rounded-xl px-5 py-4 outline-none transition w-full" />

                    <input type="password"
                        id="senha"
                        placeholder="Senha"
                        required
                        class="bg-slate-800 border-2 border-slate-700 focus:border-orange-500 rounded-xl px-5 py-4 outline-none transition w-full" />

                    <button type="submit"
                        class="bg-orange-500 hover:bg-orange-600 rounded-xl py-4 text-lg font-semibold transition hover:scale-[1.02] active:scale-[0.98] shadow-lg cursor-pointer">
                        Entrar
                    </button>

                    <p id="mensagemErro" class="text-red-400 text-sm"></p>

                </form>

            </div>

        </section>

        <section class="w-full lg:w-[55%] bg-slate-900 min-h-[300px] lg:min-h-full overflow-hidden">

            <img src="senouraa.jpg"
                alt="SenouraChat"
                class="w-full h-full object-cover max-h-[1000px]" />

        </section>

    </main>

    <div id="loginAlert"
        class="fixed top-5 right-5 z-[9999] translate-x-full opacity-0 transition-all duration-500 bg-gradient-to-br from-red-500 to-orange-500 border border-white/20 rounded-xl px-5 py-4 shadow-2xl max-w-[90vw] flex items-center gap-4">

        <span class="font-medium text-sm md:text-base">
            Faça login primeiro.
        </span>

        <button class="text-xl hover:opacity-70 transition">
            ×
        </button>

    </div>

    <footer class="bg-[#08101f] border-t-2 border-orange-500 text-center px-4 py-6">

        <p class="text-slate-300 text-sm">
            IFRN campus Santa Cruz
        </p>

        <p class="text-slate-300 text-sm">
            Trabalho de Programação para Internet
        </p>

        <p class="text-slate-300 text-sm">
            Prof. Marcelo Figueiredo Barbosa Júnior
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
