<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>SenouraChat</title>
</head>

<body class="h-screen overflow-hidden flex bg-gray-800">

    <aside class="border-r border-gray-600 h-screen w-64 bg-gray-900 p-4 flex flex-col">

    
        <div class="flex flex-col items-center">
            
            <h1 class="text-2xl font-bold text-white">
                CONVERSAS
            </h1>

            <div class="w-36 h-1 bg-orange-400 rounded-full mt-2"></div>
        </div>

        <div class="flex flex-col gap-2 mt-6">

            
            <button class="
                flex items-center gap-3
                p-3 rounded-2xl
                hover:bg-gray-800
                transition-all duration-200
                w-full
                ">

                <img
                    src="img/fabricio.png"
                    class="w-12 h-12 rounded-full object-cover"
                >

                <div class="flex flex-col items-start">
                    <h2 class="text-white font-semibold">
                        Fabricio
                    </h2>

                    <p class="text-gray-400 text-sm">
                        Offline
                    </p>
                </div>

            </button>


            <button class="
                flex items-center gap-3
                p-3 rounded-2xl
                hover:bg-gray-800
                transition-all duration-200
                w-full
                ">

                <img
                    src="img/agiota.png"
                    class="w-12 h-12 rounded-full object-cover"
                >

                <div class="flex flex-col items-start">
                    <h2 class="text-white font-semibold">
                        Agiota
                    </h2>

                    <p class="text-gray-400 text-sm">
                        Online
                    </p>
                </div>

            </button>


            <button class="
                flex items-center gap-3
                p-3 rounded-2xl
                hover:bg-gray-800
                transition-all duration-200
                w-full
                ">

                <img
                    src="img/mateus.png"
                    class="w-12 h-12 rounded-full object-cover"
                >

                <div class="flex flex-col items-start">
                    <h2 class="text-white font-semibold">
                        Mateus
                    </h2>

                    <p class="text-gray-400 text-sm">
                        Visto há 2 min
                    </p>
                </div>

            </button>


            <button class="
                flex items-center gap-3
                p-3 rounded-2xl
                hover:bg-gray-800
                transition-all duration-200
                w-full
                ">

                <img
                    src="img/mulher.png" 
                    class="w-12 h-12 rounded-full object-cover"
                >

                <div class="flex flex-col items-start">
                    <h2 class="text-white font-semibold">
                        Amor❤️
                    </h2>

                    <p class="text-gray-400 text-sm">
                        Visto há 1 hora
                    </p>
                </div>

            </button>

        </div>

    </aside>

    <div class="flex-1 flex flex-col p-4 gap-4">
        <header class="rounded-2xl bg-slate-700">
            <div class="flex items-center justify-between p-4">
                <div class="flex items-center gap-3">

                    <img
                        src="img/papai.jpeg"
                        alt="Logo"
                        class="w-12 h-12 rounded-full">
                    <h1 class="text-2xl font-bold text-white">
                        Papai
                    </h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn_senoura" class="
                        bg-slate-600 hover:bg-slate-500
                        p-3 rounded-xl
                        transition-all duration-200
                    ">
                        🥕
                    </button>

                    <button class="
                        bg-slate-600 hover:bg-slate-500
                        p-3 rounded-xl
                        transition-all duration-200 text-gray-200
                    ">
                        ⋮
                    </button>
                </div>
            </div>
        </header>

        <main class="flex flex-col flex-1 overflow-hidden p-3 pr-1 gap-4">

            <div id="chat" class="flex-1 flex flex-col gap-2
                overflow-y-auto pr-2
                [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">
                <div class="w-full flex">
                    <div class="bg-white px-4 py-2 rounded-2xl">
                        Fala, desgraça
                    </div>
                </div>
                
                <div class="w-full flex justify-end">
                    <div class="bg-orange-400 self-end px-4 py-2 rounded-2xl text-white">
                        tudo bem?
                    </div>
                </div>

            </div>
            <div class="flex gap-2">
                <textarea name="" id="txt_area" class="flex-1 bg-gray-800 
                rounded-2xl placeholder:text-gray-300 border border-gray-200 
                px-4 py-3 resize-none min-h-[50px] text-gray-300
                focus:outline-none focus:ring-2 focus:ring-orange-300" 
                placeholder="Digite uma mensagem"></textarea>
                
                <button id="btn_enviar" class="bg-orange-500 hover:bg-orange-400 text-white
                 px-4 py-2 rounded-2xl">Enviar</button>
            </div>
        </main>
    </div>
    <script src="chat.js"></script>
</body>
</html>
